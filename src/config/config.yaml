data:
  root_dir: data
  raw_dir: data/raw
  dataset_path: data/raw/network_intrusion.csv
  processed_dir: data/processed
  processed_dataset_path: data/processed/network_intrusion.csv
  train_file: data/processed/train.csv
  test_file: data/processed/test.csv
  train_array_path: data/processed/train.npy
  test_array_path: data/processed/test.npy
  target_column: label
  required_columns:
    - duration
    - protocol_type
    - service
    - src_bytes
    - dst_bytes
    - label

artifacts:
  root_dir: artifacts
  data_ingestion_dir: artifacts/data_ingestion
  data_validation_dir: artifacts/data_validation
  model_trainer_dir: artifacts/model_trainer

reports:
  root_dir: reports
  validation_report: reports/validation_report.json
  validation_report_path: reports/validation_report.json
  metrics_file: reports/metrics.json

model:
  path: artifacts/model_trainer/model.pkl

preprocessor:
  path: artifacts/preprocessor.pkl

metrics:
  path: reports/metrics.json

random_state: 42
